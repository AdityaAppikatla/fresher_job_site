<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshHire — Fresher Job Board</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0c0c10; --ink2: #1a1a24; --surface: #f4f3ef;
  --paper: #faf9f6; --white: #ffffff; --border: rgba(12,12,16,0.1);
  --border2: rgba(12,12,16,0.07); --muted: #7a7a8c; --gold: #c8a84b;
  --teal: #1a8c6e; --radius: 12px; --radius-sm: 8px; --radius-pill: 100px; --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --vlsi-color: #5b3fbe; --vlsi-bg: rgba(91,63,190,0.08);
  --emb-color: #c96020; --emb-bg: rgba(201,96,32,0.08);
  --soft-color: #1a7c5a; --soft-bg: rgba(26,124,90,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); font-family: 'Cabinet Grotesk', system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
header { position: sticky; top: 0; z-index: 200; background: rgba(250,249,246,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; padding: 0 4vw; }
.logo { font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 1.25rem; color: var(--ink); display: flex; align-items: center; gap: 0.5rem; }
.logo-mark { width: 28px; height: 28px; background: var(--ink); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
.logo-word em { font-style: normal; color: var(--gold); }
.main { max-width: 900px; margin: 0 auto; padding: 3rem 4vw; }
.toolbar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
.search-field { flex: 1; }
.search-input { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 1rem; font-family: inherit; font-size: 0.88rem; outline: none; }
.filter-group { display: flex; gap: 6px; }
.fpill { padding: 0.5rem 1rem; border-radius: var(--radius-pill); border: 1px solid var(--border); background: var(--white); color: var(--muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.fpill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.meta-bar { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 1.25rem; }
.job-list { display: flex; flex-direction: column; }
.job-row { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; background: var(--white); border: 1px solid var(--border2); border-bottom: none; }
.job-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.job-row:last-child { border-bottom: 1px solid var(--border2); border-radius: 0 0 var(--radius) var(--radius); }
.row-indicator { width: 3px; height: 36px; border-radius: 3px; }
.row-indicator.VLSI { background: var(--vlsi-color); }
.row-indicator.Embedded { background: var(--emb-color); }
.row-indicator.Software { background: var(--soft-color); }
.row-body { flex: 1; min-width: 0; }
.row-title { font-size: 0.9rem; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.row-company { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
.domain-tag { font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.55rem; border-radius: var(--radius-pill); margin-left: 0.5rem; text-transform: uppercase; }
.domain-tag.VLSI { background: var(--vlsi-bg); color: var(--vlsi-color); }
.domain-tag.Embedded { background: var(--emb-bg); color: var(--emb-color); }
.domain-tag.Software { background: var(--soft-bg); color: var(--soft-color); }
.btn-visit { display: inline-flex; align-items: center; padding: 0.45rem 0.9rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 0.78rem; font-weight: 600; text-decoration: none; transition: all var(--transition); }
.btn-visit:hover { background: var(--ink); border-color: var(--ink); color: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"><span style="color:#f5e9c8; font-size:12px;">★</span></div>
    <span class="logo-word">Fresh<em>Hire</em></span>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <div class="search-field">
      <input class="search-input" type="text" id="searchInput" placeholder="Search technology, role, or company..." oninput="renderAll()" />
    </div>
    <div class="filter-group">
      <button class="fpill active" id="pill-All" onclick="setFilter('All', this)">All</button>
      <button class="fpill" id="pill-VLSI" onclick="setFilter('VLSI', this)">VLSI</button>
      <button class="fpill" id="pill-Embedded" onclick="setFilter('Embedded', this)">Embedded</button>
      <button class="fpill" id="pill-Software" onclick="setFilter('Software', this)">Software</button>
    </div>
  </div>

  <div class="meta-bar">
    <span>Pipeline Status: <strong style="color:var(--teal)">Online 24/7</strong></span>
    <span>Showing <strong id="countMeta">—</strong> verified openings</span>
  </div>

  <div id="jobList" class="job-list"></div>
</main>

<script>
let allJobs = [];
let activeFilter = 'All';

async function loadJobFeed() {
  try {
    const res = await fetch('jobs.json?v=' + Date.now());
    const data = await res.json();
    allJobs = data.jobs || [];
    renderAll();
  } catch(e) {
    document.getElementById('jobList').innerHTML = `<p>Error loading job feed.</p>`;
  }
}

function setFilter(domain, buttonEl) {
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  buttonEl.classList.add('active');
  activeFilter = domain;
  renderAll();
}

function renderAll() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = allJobs;

  if (activeFilter !== 'All') filtered = filtered.filter(j => j.domain === activeFilter);
  if (q) filtered = filtered.filter(j => j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q));

  document.getElementById('countMeta').textContent = filtered.length;
  const container = document.getElementById('jobList');

  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:3rem; color:var(--muted);">No matching open roles found.</div>`;
    return;
  }

  container.innerHTML = filtered.map(j => `
    <div class="job-row">
      <div class="row-indicator ${j.domain}"></div>
      <div class="row-body">
        <div class="row-title">${j.title} <span class="domain-tag ${j.domain}">${j.domain}</span></div>
        <div class="row-company">${j.company}</div>
      </div>
      <a href="${j.url}" target="_blank" rel="noopener" class="btn-visit">Apply</a>
    </div>
  `).join('');
}

// Start feed immediately
loadJobFeed();
</script>
</body>
</html>
