name: 24-7 Rapid Job Sync

on:
  schedule:
    # Triggers every single hour, 24 times a day, completely hands-free
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync_engine:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Source Code
        uses: actions/checkout@v4

      - name: Initialize Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Core Dependencies
        run: pip install requests

      - name: Execute Aggregation Engine
        run: python scraper.py

      - name: Live Push To Dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          git diff --staged --quiet || git commit -m "🤖 Realtime Job Sync $(date +'%Y-%m-%d %H:%M IST')"
          git push
